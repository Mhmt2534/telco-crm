server:
  port: 9002

spring:
  application:
    name: customer-service
  config:
    import: "optional:configserver:http://localhost:8888"
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: jdbc:postgresql://localhost:5434/customer_db
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  datasource:
    url: jdbc:postgresql://localhost:5434/customer_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

app:
  security:
    pii-encryption-key: ${PII_ENCRYPTION_KEY:default-dev-key-32-chars-long!!!}
