server:
  port: 8080

spring:
  application:
    name: api-gateway
  reactor:
    context-propagation: auto
  config:
    import: "optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}"


  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
              predicates:
                - name: Path
                  args:
                    pattern: "'/'+serviceId+'/**'"
              filters:
                - name: RewritePath
                  args:
                    regexp: "'/' + serviceId + '/(?<remaining>.*)'"
                    replacement: "'/${remaining}'"
          routes:
            # ── OpenAPI doc routes (Swagger aggregation) ──
            - id: identity-service-api-docs
              uri: lb://identity-service
              predicates:
                - Path=/identity-service/v3/api-docs/**
              filters:
                - RewritePath=/identity-service/(?<remaining>.*), /${remaining}
            - id: customer-service-api-docs
              uri: lb://customer-service
              predicates:
                - Path=/customer-service/v3/api-docs/**
              filters:
                - RewritePath=/customer-service/(?<remaining>.*), /${remaining}
            - id: product-catalog-service-api-docs
              uri: lb://product-catalog-service
              predicates:
                - Path=/product-catalog-service/v3/api-docs/**
              filters:
                - RewritePath=/product-catalog-service/(?<remaining>.*), /${remaining}
            - id: order-service-api-docs
              uri: lb://order-service
              predicates:
                - Path=/order-service/v3/api-docs/**
              filters:
                - RewritePath=/order-service/(?<remaining>.*), /${remaining}
            - id: subscription-service-api-docs
              uri: lb://subscription-service
              predicates:
                - Path=/subscription-service/v3/api-docs/**
              filters:
                - RewritePath=/subscription-service/(?<remaining>.*), /${remaining}
            - id: usage-service-api-docs
              uri: lb://usage-service
              predicates:
                - Path=/usage-service/v3/api-docs/**
              filters:
                - RewritePath=/usage-service/(?<remaining>.*), /${remaining}
            - id: billing-service-api-docs
              uri: lb://billing-service
              predicates:
                - Path=/billing-service/v3/api-docs/**
              filters:
                - RewritePath=/billing-service/(?<remaining>.*), /${remaining}
            - id: payment-service-api-docs
              uri: lb://payment-service
              predicates:
                - Path=/payment-service/v3/api-docs/**
              filters:
                - RewritePath=/payment-service/(?<remaining>.*), /${remaining}
            - id: notification-service-api-docs
              uri: lb://notification-service
              predicates:
                - Path=/notification-service/v3/api-docs/**
              filters:
                - RewritePath=/notification-service/(?<remaining>.*), /${remaining}
            - id: ticket-service-api-docs
              uri: lb://ticket-service
              predicates:
                - Path=/ticket-service/v3/api-docs/**
              filters:
                - RewritePath=/ticket-service/(?<remaining>.*), /${remaining}
            # ── Business API routes ──
            - id: identity-service
              uri: lb://identity-service
              predicates:
                - Path=/api/v1/auth, /api/v1/auth/**, /api/v1/users, /api/v1/users/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers, /api/v1/customers/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: product-catalog-service
              uri: lb://product-catalog-service
              predicates:
                - Path=/api/v1/tariffs, /api/v1/tariffs/**, /api/v1/addons, /api/v1/addons/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders, /api/v1/orders/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: subscription-service
              uri: lb://subscription-service
              predicates:
                - Path=/api/v1/subscriptions, /api/v1/subscriptions/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: usage-service
              uri: lb://usage-service
              predicates:
                - Path=/api/v1/usage, /api/v1/usage/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: billing-service
              uri: lb://billing-service
              predicates:
                - Path=/api/v1/invoices, /api/v1/invoices/**, /api/v1/billing, /api/v1/billing/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments, /api/v1/payments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications, /api/v1/notifications/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
            - id: ticket-service
              uri: lb://ticket-service
              predicates:
                - Path=/api/v1/tickets, /api/v1/tickets/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"



management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
