server:
  port: 9006

spring:
  application:
    name: usage-service
  config:
    import: "optional:configserver:http://localhost:8888"

  # ── Local fallback (config-server öncelikli) ──────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:15439/usage_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:15439/usage_db
    user: postgres
    password: postgres
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: usage-service
      auto-offset-reset: earliest

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka}@localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
