spring:
  datasource:
    url: jdbc:postgresql://billing-db:5432/billing_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  flyway:
    url: jdbc:postgresql://billing-db:5432/billing_db
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

logging:
  level:
    root: INFO
    com.telcox: DEBUG

app:
  kafka:
    topics:
      payment-events: "telcox.Payment.events"

