spring:
  datasource:
    url: jdbc:postgresql://order-db:5432/order_db
spring:
  datasource:
    url: jdbc:postgresql://order-db:5432/order_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    url: jdbc:postgresql://order-db:5432/order_db
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true

app:
  saga:
    stuck-job-cron: "0 */5 * * * *"
    stuck-threshold-minutes: 5

resilience4j:
  circuitbreaker:
    instances:
      customer-service:
        failureRateThreshold: 50
        minimumNumberOfCalls: 10
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
      product-catalog-service:
        failureRateThreshold: 50
        minimumNumberOfCalls: 10
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
      subscription-service:
        failureRateThreshold: 50
        minimumNumberOfCalls: 10
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
  retry:
    instances:
      customer-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
      product-catalog-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
      subscription-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  timelimiter:
    instances:
      customer-service:
        timeoutDuration: 3s
      product-catalog-service:
        timeoutDuration: 3s
      subscription-service:
        timeoutDuration: 3s