spring:
  datasource:
    url: jdbc:postgresql://order-db:5432/order_db
spring:
  datasource:
    url: jdbc:postgresql://order-db:5432/order_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    url: jdbc:postgresql://order-db:5432/order_db
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      customer-service:
        failureRateThreshold: 50
        minimumNumberOfCalls: 10
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
      product-catalog-service:
        failureRateThreshold: 50
        minimumNumberOfCalls: 10
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
  retry:
    instances:
      customer-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException
      product-catalog-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        ignoreExceptions:
          - com.telcox.common.core.exception.ResourceNotFoundException