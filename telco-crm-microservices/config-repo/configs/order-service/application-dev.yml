spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/order_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  flyway:
    url: jdbc:postgresql://localhost:5436/order_db
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.telcox: DEBUG
