eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka}@discovery-server:8761/eureka/

spring:
  kafka:
    bootstrap-servers: host.minikube.internal:9094
  data:
    redis:
      host: host.minikube.internal
      port: 6379

management:
  zipkin:
    tracing:
      endpoint: http://host.minikube.internal:9411/api/v2/spans
