spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/identity_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  flyway:
    url: jdbc:postgresql://localhost:5433/identity_db
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

logging:
  level:
    root: INFO
    com.telcox: DEBUG
