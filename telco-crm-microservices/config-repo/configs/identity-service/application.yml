spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true

logging:
  level:
    root: INFO
    com.telcox: DEBUG
    org.springframework.web.client: DEBUG
---
spring:
  config:
    activate:
      on-profile: k8s
  datasource:
    url: jdbc:postgresql://host.minikube.internal:5432/identity_db
  flyway:
    url: jdbc:postgresql://host.minikube.internal:5432/identity_db

keycloak:
  server-url: http://host.minikube.internal:9011
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
