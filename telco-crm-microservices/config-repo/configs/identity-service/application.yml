spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/identity_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5433/identity_db
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9011}
  realm: ${KEYCLOAK_REALM:telco-crm-realm}
  client-id: ${KEYCLOAK_CLIENT_ID:telco-crm-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:changeme-set-via-setx}

logging:
  level:
    root: INFO
    com.telcox: DEBUG
    org.springframework.web.client: DEBUG