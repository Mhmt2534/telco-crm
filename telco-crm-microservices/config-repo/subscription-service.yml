spring:
  datasource:
    url: jdbc:postgresql://localhost:5437/subscription_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5437/subscription_db
    user: postgres
    password: postgres
