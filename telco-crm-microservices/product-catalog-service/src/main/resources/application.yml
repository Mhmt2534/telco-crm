server:
  port: 9003

spring:
  application:
    name: product-catalog-service
  config:
    import: "optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}"
  flyway:
    enabled: true
    baseline-on-migrate: true
  cache:
    type: redis
    redis:
      enable-statistics: true


app:
  cache:
    tariff-list-ttl: 600
    tariff-detail-ttl: 1800

