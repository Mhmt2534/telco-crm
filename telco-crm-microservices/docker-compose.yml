services:
  # ──── PostgreSQL ────
  postgres:
    image: postgres:16-alpine
    container_name: telco-postgres
    environment:
      POSTGRES_USER: telco_admin
      POSTGRES_PASSWORD: telco_password
      POSTGRES_DB: telco_default
    ports:
      - "5433:5432"
    volumes:
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telco_admin -d telco_default"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──── Apache Kafka (KRaft mode) ────
  # NOTE: Bitnami moved versioned tags to the `bitnamilegacy` namespace (Aug 2025).
  # `bitnami/kafka:3.9.0` is no longer pullable; use the archived legacy image.
  kafka:
    image: bitnamilegacy/kafka:3.9.0
    container_name: telco-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - KAFKA_KRAFT_CLUSTER_ID=NjZkNTY0NzZkYjFhNDhjNw
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──── Redis ────
  redis:
    image: redis:7-alpine
    container_name: telco-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──── Zipkin ────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: telco-zipkin
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem

  # ════════════════════════════════════════════════════════════════════════
  # Developer tooling (local only). Started only with the `tools` profile:
  #   docker compose --profile tools up -d
  # Plain `docker compose up -d` keeps starting just the core services above.
  # ════════════════════════════════════════════════════════════════════════

  # ──── Kafka UI ──── http://localhost:8085 (container port 8080 -> 8085 to avoid gateway clash)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: telco-kafka-ui
    profiles: ["tools"]
    ports:
      - "8085:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=telco-local
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka:29092
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      kafka:
        condition: service_healthy

  # ──── Mailpit ──── web UI http://localhost:8025, SMTP localhost:1025 (mock e-mail sink)
  mailpit:
    image: axllent/mailpit:latest
    container_name: telco-mailpit
    profiles: ["tools"]
    ports:
      - "8025:8025"
      - "1025:1025"

  # ──── RedisInsight ──── http://localhost:5540 (add connection manually: host `redis`, port 6379)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: telco-redisinsight
    profiles: ["tools"]
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
