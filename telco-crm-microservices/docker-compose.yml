  # ════════════════════════════════════════════════════════════════════════
  # API Gateway — the only service published to the host (port 8080).
  # Starts last, after all downstream microservices are healthy.
  # ════════════════════════════════════════════════════════════════════════

  # ──── keycloak (8081) ────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Geliştirme ortamında (http) çalışabilmesi için proxy modunu açıyoruz.
      KC_PROXY: edge
      KC_FEATURES: scripts
    command: start-dev --import-realm # Lokal geliştirme modu
    ports:
      - "${KEYCLOAK_PORT:-9011}:8080" # api-gateway(8080) ile çakışmaması için 9011'e bind edilmiştir.
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo 'Keycloak is up' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - telco-net

  # ──── api-gateway (8080) ────
  api-gateway:
    build:
      context: .
      args:
        SERVICE: api-gateway
    container_name: api-gateway
    profiles: [ "apps" ]
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Size the JVM heap to the container memory limit (local-dev footprint).
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 640m
    networks:
      - telco-net

