services:

  # ════════════════════════════════════════════════════════════════════════
  # Database Per Service — each microservice owns an isolated PostgreSQL
  # instance. Services must never connect to another service's database.
  # Internal hostname  : <service-name>:5432
  # Host (dev) port    : see table below
  # ════════════════════════════════════════════════════════════════════════

  # ──── keycloak DB  (host: 5443) ────
  keycloak-db:
    image: postgres:17
    container_name: keycloak-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: keycloak_db
    ports:
      - "${KEYCLOAK_DB_PORT:-5443}:5432" # Diğer DB port serisine uygun olarak 5443 seçilmiştir.
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d keycloak_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── identity-service DB  (host: 5433) ────
  identity-db:
    image: postgres:17
    container_name: identity-db
    profiles: [ "dbs" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: identity_db
    ports:
      - "${IDENTITY_DB_PORT:-5433}:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d identity_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── customer-service DB  (host: 5434) ────
  customer-db:
    image: postgres:17
    container_name: customer-db
    profiles: [ "dbs" ]
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: customer_db
    ports:
      - "${CUSTOMER_DB_PORT:-5434}:5432"
    volumes:
      - customer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d customer_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── product-catalog-service DB  (host: 5435) ────
  product-db:
    image: postgres:17
    container_name: product-db
    profiles: [ "dbs" ]
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: product_catalog_db
    ports:
      - "${PRODUCT_DB_PORT:-5435}:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d product_catalog_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── order-service DB  (host: 5436) ────
  order-db:
    image: postgres:17
    container_name: order-db
    profiles: [ "dbs" ]
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: order_db
    ports:
      - "${ORDER_DB_PORT:-5436}:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d order_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── subscription-service DB  (host: 5437) ────
  subscription-db:
    image: postgres:17
    container_name: subscription-db
    profiles: [ "dbs" ]
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: subscription_db
    ports:
      - "${SUBSCRIPTION_DB_PORT:-5437}:5432"
    volumes:
      - subscription-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d subscription_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── billing-service DB  (host: 5438) ────
  billing-db:
    image: postgres:17
    container_name: billing-db
    profiles: [ "dbs" ]
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: billing_db
    ports:
      - "${BILLING_DB_PORT:-5438}:5432"
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d billing_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── usage-service DB  (host: 5439) ────
  usage-db:
    image: postgres:17
    container_name: usage-db
    profiles: [ "dbs" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: usage_db
    ports:
      - "${USAGE_DB_PORT:-5439}:5432"
    volumes:
      - usage-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d usage_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── notification-service DB  (host: 5440) ────
  notification-db:
    image: postgres:17
    container_name: notification-db
    profiles: [ "dbs" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: notification_db
    ports:
      - "${NOTIFICATION_DB_PORT:-5440}:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notification_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── ticket-service DB  (host: 5441) ────
  ticket-db:
    image: postgres:17
    container_name: ticket-db
    profiles: [ "dbs" ]
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ticket_db
    ports:
      - "${TICKET_DB_PORT:-5441}:5432"
    volumes:
      - ticket-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ticket_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── payment-service DB  (host: 5442) ────
  payment-db:
    image: postgres:17
    container_name: payment-db
    profiles: [ "dbs" ]
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: payment_db
    ports:
      - "${PAYMENT_DB_PORT:-5442}:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d payment_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ════════════════════════════════════════════════════════════════════════
  # Messaging
  # ════════════════════════════════════════════════════════════════════════

  # ──── Apache Kafka (KRaft mode) ────
  # NOTE: Bitnami moved versioned tags to the `bitnamilegacy` namespace (Aug 2025).
  # `bitnami/kafka:3.9.0` is no longer pullable; use the archived legacy image.
  kafka:
    image: bitnamilegacy/kafka:3.9.0
    container_name: telco-kafka
    ports:
      - "${KAFKA_EXT_PORT:-9092}:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:${KAFKA_EXT_PORT:-9092}
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - KAFKA_KRAFT_CLUSTER_ID=NjZkNTY0NzZkYjFhNDhjNw
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      # Cap the broker heap so it comfortably fits the memory limit below.
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:29092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - telco-net

  # ════════════════════════════════════════════════════════════════════════
  # Cache
  # ════════════════════════════════════════════════════════════════════════

  # ──── Redis ────
  redis:
    image: redis:7-alpine
    container_name: telco-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192m
    networks:
      - telco-net

  # ════════════════════════════════════════════════════════════════════════
  # Observability
  # ════════════════════════════════════════════════════════════════════════

  # ──── Zipkin ────
  zipkin:
    image: openzipkin/zipkin:3.6.1
    container_name: telco-zipkin
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    environment:
      - STORAGE_TYPE=mem
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - telco-net

  # ──── Prometheus ────
  prometheus:
    image: prom/prometheus:latest
    container_name: telco-prometheus
    profiles: [ "dbs" ]
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── Grafana ────
  grafana:
    image: grafana/grafana:latest
    container_name: telco-grafana
    profiles: [ "dbs" ]
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ──── Debezium (Kafka Connect) ────
  debezium:
    image: quay.io/debezium/connect:2.7
    container_name: telco-debezium
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-cluster
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      kafka:
        condition: service_healthy
      customer-db:
        condition: service_healthy
      product-db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - telco-net

  # ════════════════════════════════════════════════════════════════════════
  # Platform infrastructure — Service Discovery (Eureka) + Centralized Config.
  # Built from the shared multi-stage Dockerfile via the SERVICE build-arg.
  # These start before the business microservices.
  # ════════════════════════════════════════════════════════════════════════

  # ──── Eureka Discovery Server (8761) ────
  discovery-server:
    build:
      context: .
      args:
        SERVICE: discovery-server
    container_name: discovery-server
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    environment:
      # Size the JVM heap to the container memory limit (local-dev footprint).
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
    healthcheck:
      # Dashboard/actuator are secured (basic auth) — treat 200/401 as "up".
      test: [ "CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8761/actuator/health | grep -qE '200|401'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - telco-net

  # ──── Spring Cloud Config Server (8888, native profile) ────
  config-server:
    build:
      context: .
      args:
        SERVICE: config-server
    container_name: config-server
    ports:
      - "${CONFIG_PORT:-8888}:8888"
    environment:
      # Folder-based config-repo: service-specific + global paths
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCHLOCATIONS_0: file:/config-repo/configs
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCHLOCATIONS_1: file:/config-repo/configs/{application}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:-eureka}@discovery-server:8761/eureka/
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-changeme-set-via-setx}
      # Size the JVM heap to the container memory limit (local-dev footprint).
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
    volumes:
      - ./config-repo:/config-repo:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8888/actuator/health | grep -qE '200|401'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      discovery-server:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - telco-net

  # ════════════════════════════════════════════════════════════════════════
  # Developer tooling (local only). Started only with the `tools` profile:
  #   docker compose --profile tools up -d
  # Plain `docker compose up -d` starts only the core services above.
  # ════════════════════════════════════════════════════════════════════════

  # ──── Kafka UI ──── http://localhost:8085 (8080 → 8085 to avoid gateway clash)
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: telco-kafka-ui
    profiles: [ "tools" ]
    ports:
      - "8085:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=telco-local
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka:29092
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - telco-net

  # ──── Mailpit ──── web UI http://localhost:8025 · SMTP localhost:1025 (mock e-mail sink)
  mailpit:
    image: axllent/mailpit:v1.30.2
    container_name: telco-mailpit
    profiles: [ "tools" ]
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    deploy:
      resources:
        limits:
          memory: 128m
    networks:
      - telco-net

  # ──── RedisInsight ──── http://localhost:5540  (add connection: host `redis`, port 6379)
  redisinsight:
    image: redis/redisinsight:3.6.0
    container_name: telco-redisinsight
    profiles: [ "tools" ]
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 320m
    networks:
      - telco-net

  # ──── MinIO (S3 object storage for invoices) ──── http://localhost:9001 (Console), http://localhost:9000 (API)
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: telco-minio
    profiles: [ "tools" ]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - telco-net

  # ════════════════════════════════════════════════════════════════════════
  # Spring Boot microservices — internal only (no host ports / no expose).
  # Reachable solely over the `telco-net` Docker network. Only the api-gateway
  # is published to the host. Each is built from the shared Dockerfile via the
  # SERVICE build-arg. In-container hostnames override the localhost-based
  # values in config-repo (which target host-run services).
  # ════════════════════════════════════════════════════════════════════════

  # ──── identity-service (9001) ────
  identity-service:
    build:
      context: .
      args:
        SERVICE: identity-service
    container_name: identity-service
    profiles: [ "apps" ]
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Size the JVM heap to the container memory limit (local-dev footprint).
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
    depends_on:
      identity-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9001/actuator/health/readiness || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - telco-net

  # ──── customer-service (9002) ────
  customer-service:
    build:
      context: .
      args:
        SERVICE: customer-service
    container_name: customer-service
    profiles: [ "apps" ]
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Size the JVM heap to the container memory limit (local-dev footprint).
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
    depends_on:
      customer-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9002/actuator/health/readiness || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - telco-net

  # ──── product-catalog-service (9003) ────
  product-catalog-service:
    build:
      context: .
      args:
        SERVICE: product-catalog-service
    container_name: product-catalog-service
    profiles: [ "apps" ]
    environment:
      SPRING_PROFILES_ACTIVE: dev
