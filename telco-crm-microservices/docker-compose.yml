version: '3.8'

services:
  # ──── PostgreSQL ────
  postgres:
    image: postgres:16-alpine
    container_name: telco-postgres
    environment:
      POSTGRES_USER: telco_admin
      POSTGRES_PASSWORD: telco_password
      POSTGRES_DB: telco_default
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telco_admin -d telco_default"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──── Apache Kafka (KRaft mode) ────
  kafka:
    image: bitnami/kafka:3.9.0
    container_name: telco-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - KAFKA_KRAFT_CLUSTER_ID=NjZkNTY0NzZkYjFhNDhjNw
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──── Redis ────
  redis:
    image: redis:7-alpine
    container_name: telco-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──── Zipkin ────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: telco-zipkin
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
