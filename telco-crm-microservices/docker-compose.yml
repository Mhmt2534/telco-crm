services:

  # ════════════════════════════════════════════════════════════════════════
  # Database Per Service — each microservice owns an isolated PostgreSQL
  # instance. Services must never connect to another service's database.
  # Internal hostname  : <service-name>:5432
  # Host (dev) port    : see table below
  # ════════════════════════════════════════════════════════════════════════

  # ──── identity-service DB  (host: 5433) ────
  identity-db:
    image: postgres:17
    container_name: identity-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity_db
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telco-net

  # ──── customer-service DB  (host: 5434) ────
