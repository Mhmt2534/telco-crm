networks:
  telco-net:
    driver: bridge

# ════════════════════════════════════════════════════════════════════════
# Named volumes — one dedicated volume per database container
# ════════════════════════════════════════════════════════════════════════
volumes:
  identity-db-data:
  customer-db-data:
  product-db-data:
  order-db-data:
  subscription-db-data:
  billing-db-data:
  usage-db-data:
  notification-db-data:
  ticket-db-data:
  payment-db-data:
