global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'telco-crm'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - host.docker.internal:8080 # api-gateway
          - host.docker.internal:8761 # discovery-server
          - host.docker.internal:8888 # config-server
          - host.docker.internal:9001 # identity-service
          - host.docker.internal:9002 # customer-service
          - host.docker.internal:9003 # product-catalog-service
          - host.docker.internal:9004 # order-service
          - host.docker.internal:9005 # subscription-service
          - host.docker.internal:9006 # usage-service
          - host.docker.internal:9007 # billing-service
          - host.docker.internal:9008 # payment-service
          - host.docker.internal:9009 # notification-service
          - host.docker.internal:9010 # ticket-service
