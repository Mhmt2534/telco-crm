server:
  port: 9005

spring:
  application:
    name: subscription-service
  config:
    import: "optional:configserver:http://localhost:8888"

  # ── Local fallback (config-server öncelikli) ──────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5437/subscription_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5437/subscription_db
    user: postgres
    password: postgres

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
